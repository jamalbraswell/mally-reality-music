backend:
  name: git-gateway
  branch: main

media_folder: public/art
public_folder: /art

locale: en

collections:
  - name: site
    label: Mally Reality Site
    files:
      - name: content
        label: Edit Site
        file: content/site.json
        fields:
          - label: Hero Section
            name: hero
            widget: object
            collapsed: false
            fields:
              - { label: Artist Name, name: artistName, widget: string }
              - { label: Tagline, name: tagline, widget: text }
              - { label: Button Text, name: ctaText, widget: string, default: "Enter The Sound" }
              - { label: Logo Image, name: logo, widget: image, allow_multiple: false }
              - { label: Background Image, name: backgroundImage, widget: image, required: false }

          - label: Releases & Songs
            name: releases
            widget: list
            summary: "{{fields.title}} — {{fields.date}}"
            fields:
              - { label: ID (no spaces), name: id, widget: string, hint: "e.g. light-speed" }
              - { label: Song Title, name: title, widget: string }
              - { label: Release Date, name: date, widget: string, hint: "2026.06.19" }
              - label: Mood
                name: mood
                widget: select
                options: [pulse, void, rage, distortion, dream, love]
              - { label: Cover Art, name: cover, widget: image }
              - { label: Latest Release?, name: featured, widget: boolean, default: false, hint: "Only one should be checked" }
              - { label: Show Big Promo Card?, name: showInPromo, widget: boolean, default: false }
              - { label: Promo Header, name: promoBadge, widget: string, required: false, default: "Out Now" }
              - { label: Promo Badge Text, name: promoStatus, widget: string, required: false, default: "out now" }
              - { label: Description, name: description, widget: text, required: false }
              - label: Streaming Links
                name: links
                widget: object
                collapsed: true
                fields:
                  - { label: Spotify URL, name: spotify, widget: string, required: false }
                  - { label: Apple Music URL, name: apple, widget: string, required: false }
                  - { label: YouTube URL, name: youtube, widget: string, required: false }
                  - { label: SoundCloud URL, name: soundcloud, widget: string, required: false }
              - { label: Video File Path, name: videoSrc, widget: string, required: false, hint: "/video/your-video.mp4" }
              - { label: YouTube Video ID, name: youtubeId, widget: string, required: false }

          - label: Social & Platform Links
            name: social
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Label, name: label, widget: string }
              - { label: URL, name: href, widget: string }
              - label: Icon
                name: icon
                widget: select
                options: [spotify, apple, youtube, tiktok, instagram]
